name: Add to project

# Adds new/updated issues and PRs in this repo to the org-level
# Projects v2 board "Ditrois" (#4).
#
# Reusable workflow source: ditrois/.github

on:
  issues:
    types: [opened, reopened, edited, labeled, assigned, transferred]
  pull_request_target:
    types: [opened, reopened, edited, labeled, assigned, ready_for_review]

jobs:
  call:
    uses: ditrois/.github/.github/workflows/add-to-project.yml@main
    secrets:
      token: ${{ secrets.ADD_TO_PROJECT_PAT }}
    with:
      project-url: https://github.com/orgs/ditrois/projects/4
